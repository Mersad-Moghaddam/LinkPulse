services:
  app:
    build: .
    environment:
      HTTP_PORT: 8080
      BASE_URL: http://localhost:8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/linkpulse?sslmode=disable
      REDIS_ADDR: redis:6379
    ports: ["8080:8080"]
    depends_on: [postgres, redis]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: linkpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    depends_on: [app]
  grafana:
    image: grafana/grafana:11.1.0
    ports: ["3000:3000"]
    volumes:
      - ./deployments/grafana:/var/lib/grafana/dashboards
    depends_on: [prometheus]
volumes:
  pgdata:
