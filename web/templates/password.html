<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Protected Link • LinkPulse</title>
  <style>
    body {
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family: Inter, system-ui, sans-serif; background: radial-gradient(circle at top, #dbeafe, #f8fafc 50%);
      color:#0f172a;
    }
    .card {
      width:min(420px, 92vw); background:#fff; border:1px solid #e2e8f0; border-radius:14px;
      box-shadow:0 14px 40px rgba(15,23,42,.12); padding:22px;
    }
    h3 { margin:0 0 10px; }
    p { margin:0 0 16px; color:#64748b; font-size:.92rem; }
    input {
      width:100%; padding:12px; border-radius:10px; border:1px solid #cbd5e1; margin-bottom:10px;
      outline:none;
    }
    input:focus { border-color:#93c5fd; box-shadow:0 0 0 3px #dbeafe; }
    button {
      width:100%; border:none; border-radius:10px; padding:11px; font-weight:700; color:#fff;
      background:linear-gradient(180deg,#2563eb,#1d4ed8); cursor:pointer;
    }
    a { display:block; text-align:center; margin-top:10px; color:#475569; text-decoration:none; font-size:.9rem; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/access/{{ .Code }}">
    <h3>This link is password protected</h3>
    <p>Enter the access password to continue to the destination URL.</p>
    <input type="password" name="password" placeholder="Enter password" required />
    <button type="submit">Unlock Link</button>
    <a href="/">Back to dashboard</a>
  </form>
</body>
</html>
